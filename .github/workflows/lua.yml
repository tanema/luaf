name: Lua
on:
  push: {branches: [ "main" ]}
  pull_request: {branches: [ "main" ]}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args:  --check --syntax=Lua54 .
